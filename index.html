<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github开源仓库统计数据</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="static/css/style.css" rel="stylesheet">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <i class="bi bi-database-fill me-2"></i>Github开源仓库统计数据
        </a>
        <div class="d-flex align-items-center gap-2">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle" title="切换深色/浅色模式">
                <i class="bi bi-moon-fill" id="theme-icon"></i>
            </button>
            <button class="btn btn-outline-light btn-sm" onclick="switchView('table')" id="btn-view-table" title="表格视图">
                <i class="bi bi-table"></i>
            </button>
            <button class="btn btn-outline-light btn-sm" onclick="switchView('charts')" id="btn-view-charts" title="图表视图">
                <i class="bi bi-bar-chart-fill"></i>
            </button>
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="bi bi-download me-1"></i>导出
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#" onclick="exportCSV()"><i class="bi bi-filetype-csv me-2"></i>导出为 CSV</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<!-- 统计摘要卡片 -->
<div class="container-fluid mt-3">
    <div class="row g-3" id="summary-cards">
        <div class="col-6 col-md-3 col-xl">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <div class="stat-icon"><i class="bi bi-archive-fill"></i></div>
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">总仓库数</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3 col-xl">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <div class="stat-icon text-info"><i class="bi bi-star-half"></i></div>
                    <div class="stat-value" id="stat-avg-stars">-</div>
                    <div class="stat-label">平均星标</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3 col-xl">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <div class="stat-icon text-success"><i class="bi bi-trophy-fill"></i></div>
                    <div class="stat-value" id="stat-max-stars">-</div>
                    <div class="stat-label">最高星标</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3 col-xl">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <div class="stat-icon text-warning"><i class="bi bi-translate"></i></div>
                    <div class="stat-value" id="stat-top-lang">-</div>
                    <div class="stat-label">Top语言</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3 col-xl">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <div class="stat-icon text-danger"><i class="bi bi-code-slash"></i></div>
                    <div class="stat-value" id="stat-lang-count">-</div>
                    <div class="stat-label">编程语言数</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 表格视图 -->
<div class="container-fluid mt-3 view-panel" id="view-table">
    <!-- 搜索和筛选栏 -->
    <div class="card mb-3 filter-card">
        <div class="card-body py-2">
            <div class="row g-2 align-items-center">
                <div class="col-md-4">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="search-input"
                               placeholder="搜索仓库名、描述或组织..." oninput="debounceSearch()">
                        <button class="btn btn-outline-secondary" onclick="clearSearch()" title="清除">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm" id="language-filter" onchange="renderCurrentPage()">
                        <option value="">所有语言</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" id="sort-by" onchange="onSortDropdownChange()">
                        <option value="stars">按星标排序</option>
                        <option value="forks">按 Fork 排序</option>
                        <option value="open_issues">按 Issues 排序</option>
                        <option value="age_days">按创建时间</option>
                        <option value="repo_name">按名称排序</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" id="sort-order" onchange="onSortDropdownChange()">
                        <option value="desc">降序</option>
                        <option value="asc">升序</option>
                    </select>
                </div>
                <div class="col-md-1 text-end">
                    <button class="btn btn-outline-secondary btn-sm adv-toggle-btn"
                            onclick="toggleAdvancedFilters()" id="btn-adv-toggle" title="高级筛选">
                        <i class="bi bi-funnel"></i>
                    </button>
                </div>
            </div>

            <!-- 高级筛选折叠面板 -->
            <div class="collapse" id="advanced-filters">
                <div class="advanced-filters-panel">
                    <div class="row g-2">
                        <div class="col-md-3 adv-filter-group">
                            <label>星标数范围</label>
                            <div class="range-inputs">
                                <input type="number" class="form-control form-control-sm" id="filter-stars-min" placeholder="最小" min="0">
                                <span class="range-sep">-</span>
                                <input type="number" class="form-control form-control-sm" id="filter-stars-max" placeholder="最大" min="0">
                            </div>
                        </div>
                        <div class="col-md-3 adv-filter-group">
                            <label>Fork 数范围</label>
                            <div class="range-inputs">
                                <input type="number" class="form-control form-control-sm" id="filter-forks-min" placeholder="最小" min="0">
                                <span class="range-sep">-</span>
                                <input type="number" class="form-control form-control-sm" id="filter-forks-max" placeholder="最大" min="0">
                            </div>
                        </div>
                        <div class="col-md-3 adv-filter-group">
                            <label>仓库年龄（年）</label>
                            <div class="range-inputs">
                                <input type="number" class="form-control form-control-sm" id="filter-age-min" placeholder="最小" min="0" step="0.5">
                                <span class="range-sep">-</span>
                                <input type="number" class="form-control form-control-sm" id="filter-age-max" placeholder="最大" min="0" step="0.5">
                            </div>
                        </div>
                        <div class="col-md-3 adv-filter-group">
                            <label>社区规范要求</label>
                            <div class="d-flex flex-wrap gap-2 mt-1">
                                <div class="form-check form-check-inline mb-0">
                                    <input class="form-check-input" type="checkbox" id="filter-has-readme">
                                    <label class="form-check-label small" for="filter-has-readme">README</label>
                                </div>
                                <div class="form-check form-check-inline mb-0">
                                    <input class="form-check-input" type="checkbox" id="filter-has-coc">
                                    <label class="form-check-label small" for="filter-has-coc">行为准则</label>
                                </div>
                                <div class="form-check form-check-inline mb-0">
                                    <input class="form-check-input" type="checkbox" id="filter-has-contributing">
                                    <label class="form-check-label small" for="filter-has-contributing">贡献指南</label>
                                </div>
                                <div class="form-check form-check-inline mb-0">
                                    <input class="form-check-input" type="checkbox" id="filter-has-workflows">
                                    <label class="form-check-label small" for="filter-has-workflows">工作流</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-2">
                        <button class="btn btn-outline-secondary btn-sm" onclick="resetAdvancedFilters()">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>重置
                        </button>
                        <button class="btn btn-primary btn-sm" onclick="renderCurrentPage()">
                            <i class="bi bi-funnel-fill me-1"></i>应用筛选
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 数据表格 -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0" id="repos-table">
                <thead>
                    <tr>
                        <th class="col-id">#</th>
                        <th data-sort="repo_name">仓库名 <i class="bi sort-arrow"></i></th>
                        <th data-sort="organization">组织/作者 <i class="bi sort-arrow"></i></th>
                        <th>语言</th>
                        <th class="text-end" data-sort="stars">星标 <i class="bi sort-arrow"></i></th>
                        <th class="text-end" data-sort="forks">Forks <i class="bi sort-arrow"></i></th>
                        <th class="text-end" data-sort="open_issues">Issues <i class="bi sort-arrow"></i></th>
                        <th class="text-center">社区规范</th>
                    </tr>
                </thead>
                <tbody id="repos-tbody">
                    <tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <!-- 分页 -->
        <div class="card-footer d-flex justify-content-between align-items-center">
            <span class="text-muted small" id="page-info">-</span>
            <div class="d-flex gap-1">
                <button class="btn btn-outline-secondary btn-sm" onclick="goPage('first')" id="btn-first">
                    <i class="bi bi-chevron-double-left"></i>
                </button>
                <button class="btn btn-outline-secondary btn-sm" onclick="goPage('prev')" id="btn-prev">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <span class="btn btn-primary btn-sm disabled" id="page-current">1</span>
                <button class="btn btn-outline-secondary btn-sm" onclick="goPage('next')" id="btn-next">
                    <i class="bi bi-chevron-right"></i>
                </button>
                <button class="btn btn-outline-secondary btn-sm" onclick="goPage('last')" id="btn-last">
                    <i class="bi bi-chevron-double-right"></i>
                </button>
            </div>
            <select class="form-select form-select-sm" style="width:auto" id="per-page" onchange="renderCurrentPage()">
                <option value="10">10条/页</option>
                <option value="20" selected>20条/页</option>
                <option value="50">50条/页</option>
                <option value="100">100条/页</option>
            </select>
        </div>
    </div>
</div>

<!-- 图表视图 -->
<div class="container-fluid mt-3 d-none view-panel" id="view-charts">
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header"><i class="bi bi-pie-chart-fill me-2"></i>编程语言分布（Top 15）</div>
                <div class="card-body"><canvas id="chart-lang-dist"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header"><i class="bi bi-bar-chart-fill me-2"></i>星标数 Top 10 仓库</div>
                <div class="card-body"><canvas id="chart-top10"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header"><i class="bi bi-graph-up me-2"></i>各语言累计星标数（Top 15）</div>
                <div class="card-body"><canvas id="chart-lang-stars"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header"><i class="bi bi-diagram-3-fill me-2"></i>星标数量分布区间</div>
                <div class="card-body"><canvas id="chart-stars-range"></canvas></div>
            </div>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-info-circle me-2"></i>仓库详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detail-body"></div>
        </div>
    </div>
</div>

<!-- Toast 通知 -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast" role="alert">
        <div class="toast-header">
            <i class="bi bi-check-circle-fill text-success me-2" id="toast-icon"></i>
            <strong class="me-auto" id="toast-title">提示</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toast-body"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="static/js/app-static.js"></script>
</body>
</html>
